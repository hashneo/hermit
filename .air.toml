root = "."
tmp_dir = ".tmp"

[build]
cmd = "go build -o ./bin/hermit ./cmd/hermit"
entrypoint = "./bin/hermit"
delay = 200
exclude_dir = [".git", ".dolt", ".beads", ".tmp", "bin", "docs-cms", "ui", "node_modules"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = false
include_dir = ["cmd", "internal", "config"]
include_ext = ["go", "yaml", "yml"]
include_file = []
kill_delay = "300ms"
log = "build-errors.log"
poll = false
poll_interval = 0
rerun = false
send_interrupt = true
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = true
