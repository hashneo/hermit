name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Native repository config tests
        run: make test-native-config

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./...

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint OpenAPI
        run: npx --yes @redocly/cli@latest lint api/openapi/v1/openapi.yaml

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

  # Builds, signs, notarizes and uploads the macOS app on every main merge.
  # Requires these repository secrets (Settings → Secrets → Actions):
  #   APPLE_CERTIFICATE_P12        – base64-encoded Developer ID Application .p12
  #   APPLE_CERTIFICATE_PASSWORD   – password used when exporting the .p12
  #   APPLE_TEAM_ID                – 10-char Apple Developer Team ID
  #   APPLE_BUNDLE_ID              – production bundle ID (e.g. com.example.hermit-native)
  #   APPLE_NOTARY_KEY_ID          – App Store Connect API key ID
  #   APPLE_NOTARY_KEY_ISSUER      – App Store Connect API issuer UUID
  #   APPLE_NOTARY_KEY_P8          – full contents of the .p8 API key file
  native:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID certificate
        env:
          CERT_P12:  ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASS" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm /tmp/cert.p12

      - name: Create Local.xcconfig
        env:
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          cp hermit-native/Local.xcconfig.example hermit-native/Local.xcconfig
          sed -i '' "s/YOUR_TEAM_ID/$TEAM_ID/" hermit-native/Local.xcconfig
          sed -i '' "s/com\.yourname\.hermit-native/$BUNDLE_ID/" hermit-native/Local.xcconfig

      - name: Build xcframework + macOS app
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
            gomobile init 2>/dev/null || true
          make gomobile-build
          make native-build-macos

      - name: Sign app
        run: |
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements hermit-native/HermitNative/HermitNative.entitlements \
            HermitNative.app

      - name: Notarize app
        env:
          KEY_ID:   ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER:   ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
          KEY_P8:   ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        run: |
          echo "$KEY_P8" > /tmp/AuthKey.p8
          ditto -c -k --keepParent HermitNative.app /tmp/HermitNative.zip
          xcrun notarytool submit /tmp/HermitNative.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait
          xcrun stapler staple HermitNative.app
          rm /tmp/AuthKey.p8 /tmp/HermitNative.zip

      - name: Package DMG
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          hdiutil create -volname Hermit -srcfolder HermitNative.app \
            -ov -format UDZO "Hermit-${VERSION}.dmg"
          echo "DMG_PATH=Hermit-${VERSION}.dmg" >> $GITHUB_ENV
          echo "VERSION=${VERSION}"              >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hermit-macOS-${{ env.VERSION }}
          path: ${{ env.DMG_PATH }}
          retention-days: 90

      - name: Create GitHub release (tagged commits only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true

