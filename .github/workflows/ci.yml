name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Native repository config tests
        run: make test-native-config

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./...

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint OpenAPI
        run: npx --yes @redocly/cli@latest lint api/openapi/v1/openapi.yaml

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

  # ── Shared setup ────────────────────────────────────────────────────────────
  # Both native jobs (macOS DMG and iPad IPA) share:
  #   - Go + gomobile build of HermitServer.xcframework
  #   - Keychain import (macOS: Developer ID Application, iPad: Apple Distribution)
  #   - Local.xcconfig generation
  #
  # Required repository secrets (Settings → Secrets → Actions):
  #
  #   macOS DMG
  #   ─────────
  #   APPLE_DEV_ID_CERT_P12          base64-encoded Developer ID Application .p12
  #   APPLE_DEV_ID_CERT_PASSWORD     password for the .p12
  #   APPLE_NOTARY_KEY_ID            App Store Connect API key ID
  #   APPLE_NOTARY_KEY_ISSUER        App Store Connect API issuer UUID
  #   APPLE_NOTARY_KEY_P8            full contents of the .p8 API key file
  #
  #   iPad IPA
  #   ────────
  #   APPLE_DIST_CERT_P12            base64-encoded Apple Distribution .p12
  #   APPLE_DIST_CERT_PASSWORD       password for the .p12
  #   APPLE_IPAD_PROVISIONING_PROFILE  base64-encoded .mobileprovision
  #
  #   Shared by both
  #   ──────────────
  #   APPLE_TEAM_ID                  10-char Apple Developer Team ID
  #   APPLE_BUNDLE_ID                production bundle ID (e.g. com.example.hermit-native)
  #
  # Run scripts/ci-secrets-export.sh locally to generate all values.

  # ── macOS: sign, notarize, DMG ──────────────────────────────────────────────
  native-macos:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID certificate
        env:
          CERT_P12:  ${{ secrets.APPLE_DEV_ID_CERT_P12 }}
          CERT_PASS: ${{ secrets.APPLE_DEV_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASS" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm /tmp/cert.p12

      - name: Create Local.xcconfig
        env:
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          cp hermit-native/Local.xcconfig.example hermit-native/Local.xcconfig
          sed -i '' "s/YOUR_TEAM_ID/$TEAM_ID/" hermit-native/Local.xcconfig
          sed -i '' "s/com\.yourname\.hermit-native/$BUNDLE_ID/" hermit-native/Local.xcconfig

      - name: Build xcframework + macOS app
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
            gomobile init 2>/dev/null || true
          make gomobile-build
          make native-build-macos

      - name: Sign app
        run: |
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements hermit-native/HermitNative/HermitNative.entitlements \
            HermitNative.app

      - name: Notarize app
        env:
          KEY_ID:   ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER:   ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
          KEY_P8:   ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        run: |
          echo "$KEY_P8" > /tmp/AuthKey.p8
          ditto -c -k --keepParent HermitNative.app /tmp/HermitNative.zip
          xcrun notarytool submit /tmp/HermitNative.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait
          xcrun stapler staple HermitNative.app
          rm /tmp/AuthKey.p8 /tmp/HermitNative.zip

      - name: Package DMG
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          hdiutil create -volname Hermit -srcfolder HermitNative.app \
            -ov -format UDZO "Hermit-${VERSION}.dmg"
          echo "DMG_PATH=Hermit-${VERSION}.dmg" >> $GITHUB_ENV
          echo "VERSION=${VERSION}"              >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hermit-macOS-${{ env.VERSION }}
          path: ${{ env.DMG_PATH }}
          retention-days: 90

      - name: Create GitHub release (tagged commits only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true

  # ── iPad: build IPA, upload to TestFlight ───────────────────────────────────
  native-ipad:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Apple Distribution certificate
        env:
          CERT_P12:  ${{ secrets.APPLE_DIST_CERT_P12 }}
          CERT_PASS: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 -k "$KEYCHAIN" -P "$CERT_PASS" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm /tmp/dist.p12

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_IPAD_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > /tmp/profile.mobileprovision
          # Name the file by its UUID so Xcode can find it automatically
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])")
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          rm /tmp/profile.mobileprovision

      - name: Create Local.xcconfig
        env:
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          cp hermit-native/Local.xcconfig.example hermit-native/Local.xcconfig
          sed -i '' "s/YOUR_TEAM_ID/$TEAM_ID/" hermit-native/Local.xcconfig
          sed -i '' "s/com\.yourname\.hermit-native/$BUNDLE_ID/" hermit-native/Local.xcconfig

      - name: Build xcframework
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
            gomobile init 2>/dev/null || true
          make gomobile-build

      - name: Build iPad IPA
        env:
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer
          export DEVELOPER_DIR

          # Build archive
          xcodebuild archive \
            -project hermit-native/HermitNative.xcodeproj \
            -scheme HermitNative \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath /tmp/HermitNative-iPad.xcarchive \
            -derivedDataPath hermit-native/build \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"

          # Export IPA
          cat > /tmp/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict><key>${BUNDLE_ID}</key><string>${PROFILE_UUID}</string></dict>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/HermitNative-iPad.xcarchive \
            -exportPath /tmp/HermitNative-iPad-Export \
            -exportOptionsPlist /tmp/ExportOptions.plist

          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          cp /tmp/HermitNative-iPad-Export/*.ipa "Hermit-iPad-${VERSION}.ipa"
          echo "IPA_PATH=Hermit-iPad-${VERSION}.ipa" >> $GITHUB_ENV
          echo "VERSION=${VERSION}"                   >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hermit-iPad-${{ env.VERSION }}
          path: ${{ env.IPA_PATH }}
          retention-days: 90

      - name: Upload to TestFlight
        env:
          KEY_ID:   ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER:   ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
          KEY_P8:   ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        run: |
          echo "$KEY_P8" > /tmp/AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER" \
            --privateKey /tmp/AuthKey.p8 \
            --show-progress
          rm /tmp/AuthKey.p8
