openapi: 3.0.3
info:
  title: Hermit Platform API
  version: 1.0.0
  description: >-
    OpenAPI v1 contract for Hermit's core workflows: repository configuration,
    RFC eligibility/rendering, thread lifecycle, approval actions, and sync/health.
  license:
    name: Mozilla Public License Version 2.0
    url: https://www.mozilla.org/en-US/MPL/2.0/
servers:
  - url: https://api.hermit.local
    description: Local development endpoint
tags:
  - name: Health
    description: Platform health and readiness operations.
  - name: Repositories
    description: Repository onboarding, configuration, and validation.
  - name: RFC Documents
    description: RFC eligibility, metadata, and rendered content retrieval.
  - name: Threads
    description: Comment thread lifecycle operations for RFC collaboration.
  - name: Reviews
    description: Pull request review state and approval actions.
  - name: Sync
    description: Synchronization status and diagnostics for GitHub integration.
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Get platform health
      operationId: getPlatformHealth
      security: []
      responses:
        '200':
          description: Platform health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformHealth'
        '429':
          $ref: '#/components/responses/ApiError'
        '503':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories:
    post:
      tags: [Repositories]
      summary: Configure a repository
      operationId: createRepositoryConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepositoryRequest'
      responses:
        '201':
          description: Repository configuration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryConfig'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '409':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}:
    get:
      tags: [Repositories]
      summary: Get repository configuration
      operationId: getRepositoryConfig
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '200':
          description: Repository configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryConfig'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/validate:
    post:
      tags: [Repositories]
      summary: Validate repository access and policy compatibility
      operationId: validateRepositoryConfig
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryValidationResult'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/rfc:
    get:
      tags: [RFC Documents]
      summary: Get RFC eligibility and metadata for a pull request
      operationId: getRfcDocument
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      responses:
        '200':
          description: RFC eligibility and metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcDocument'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/rfc/render:
    get:
      tags: [RFC Documents]
      summary: Get rendered RFC content and anchor map
      operationId: renderRfcDocument
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      responses:
        '200':
          description: Rendered RFC content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcRender'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/rfcs:
    get:
      tags: [RFC Documents]
      summary: List canonical RFC files from local docs
      operationId: listRfcs
      responses:
        '200':
          description: RFC catalog response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcCatalogResponse'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/rfcs/{rfcId}:
    get:
      tags: [RFC Documents]
      summary: Get rendered RFC document by RFC id
      operationId: getRfcById
      parameters:
        - $ref: '#/components/parameters/RfcId'
      responses:
        '200':
          description: RFC rendered document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcDocumentView'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/rfcs:
    get:
      tags: [RFC Documents]
      summary: List unified RFC catalog from main and review-ready PR RFCs
      operationId: listRepositoryRfcs
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '200':
          description: Unified RFC catalog response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcCatalogResponse'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/rfcs/{rfcId}:
    get:
      tags: [RFC Documents]
      summary: Get rendered RFC document by repository-scoped RFC id
      operationId: getRepositoryRfcById
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/RfcId'
      responses:
        '200':
          description: RFC rendered document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfcDocumentView'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/rfcs/{rfcId}/submit-for-review:
    post:
      tags: [RFC Documents]
      summary: Submit a draft RFC for review
      description: >-
        Promotes a draft RFC on the main branch to "in-review" status by
        rewriting the frontmatter status field, ensuring the hermit:rfc-ready
        label exists on the repository, creating a review branch, committing
        the updated file, and opening a pull request with the label applied.
      operationId: submitRfcForReview
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/RfcId'
      responses:
        '201':
          description: Pull request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitForReviewResult'
        '400':
          $ref: '#/components/responses/ApiError'
        '409':
          description: RFC is not in a state that allows submission (accepted, implemented, superseded, rejected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '502':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/threads:
    get:
      tags: [Threads]
      summary: List RFC comment threads
      operationId: listThreads
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadListResponse'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'
    post:
      tags: [Threads]
      summary: Create a thread with an initial message
      operationId: createThread
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/threads/{threadId}/resolve:
    post:
      tags: [Threads]
      summary: Resolve an RFC thread
      operationId: resolveThread
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/threads/{threadId}/reply:
    post:
      tags: [Threads]
      summary: Reply to an RFC thread
      operationId: replyThread
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyThreadRequest'
      responses:
        '200':
          description: Thread with appended reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '400':
          $ref: '#/components/responses/ApiError'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/review/approve:
    post:
      tags: [Reviews]
      summary: Submit an approval review
      operationId: approvePullRequest
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveReviewRequest'
      responses:
        '200':
          description: Review status after approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewState'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/review:
    get:
      tags: [Reviews]
      summary: Get current pull request review state
      operationId: getPullRequestReviewState
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      responses:
        '200':
          description: Current review state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewState'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

  /api/v1/repositories/{repositoryId}/pull-requests/{prNumber}/sync:
    get:
      tags: [Sync]
      summary: Get synchronization and diagnostics status
      operationId: getSyncStatus
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
        - $ref: '#/components/parameters/PrNumber'
      responses:
        '200':
          description: Synchronization status for PR collaboration entities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
        '401':
          $ref: '#/components/responses/ApiError'
        '404':
          $ref: '#/components/responses/ApiError'
        default:
          $ref: '#/components/responses/ApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RepositoryId:
      name: repositoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Hermit repository configuration identifier.
    PrNumber:
      name: prNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: GitHub pull request number.
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Hermit thread identifier.
    RfcId:
      name: rfcId
      in: path
      required: true
      schema:
        type: string
      description: RFC identifier. Repository-scoped list may return PR-backed IDs as `pr:{number}:{path}`.

  responses:
    ApiError:
      description: Standardized API error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    SubmitForReviewResult:
      type: object
      required: [pr_number, html_url, branch]
      properties:
        pr_number:
          type: integer
          example: 42
        html_url:
          type: string
          format: uri
          example: https://github.com/org/repo/pull/42
        branch:
          type: string
          example: rfc-review/rfc-008-logging

    PlatformHealth:
      type: object
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
        service:
          type: string
          example: hermit-api
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time

    ApiError:
      type: object
      required: [code, message, correlation_id]
      properties:
        code:
          type: string
          example: repository_not_found
        message:
          type: string
          example: Repository configuration was not found.
        details:
          type: object
          additionalProperties: true
          nullable: true
        correlation_id:
          type: string
          example: 4f8b2e4f-cdb2-4d65-b280-d3b309f1b2f2

    RepositoryConfig:
      type: object
      required:
        - id
        - owner
        - name
        - default_branch
        - docs_path_policy
        - auth
        - validation
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        owner:
          type: string
        name:
          type: string
        default_branch:
          type: string
        docs_path_policy:
          type: string
          example: docs-cms/rfcs/
        auth:
          $ref: '#/components/schemas/RepositoryAuthMetadata'
        validation:
          $ref: '#/components/schemas/RepositoryValidationResult'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RepositoryAuthMetadata:
      type: object
      required: [method, token_last_validated_at]
      properties:
        method:
          type: string
          enum: [pat]
        token_last_validated_at:
          type: string
          format: date-time
          nullable: true

    RepositoryValidationResult:
      type: object
      required: [healthy, checks, validated_at]
      properties:
        healthy:
          type: boolean
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ValidationCheck'
        validated_at:
          type: string
          format: date-time
        last_error_code:
          type: string
          nullable: true

    ValidationCheck:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: github_api_access
        status:
          type: string
          enum: [pass, fail, warn]
        message:
          type: string
          nullable: true

    CreateRepositoryRequest:
      type: object
      required: [owner, name, personal_access_token]
      properties:
        owner:
          type: string
        name:
          type: string
        personal_access_token:
          type: string
          writeOnly: true
        default_branch:
          type: string
          default: main
        docs_path_policy:
          type: string
          default: docs-cms/rfcs/

    RfcDocument:
      type: object
      required:
        - repository_id
        - pr_number
        - head_sha
        - eligibility
      properties:
        repository_id:
          type: string
          format: uuid
        pr_number:
          type: integer
          minimum: 1
        head_sha:
          type: string
        file_path:
          type: string
          nullable: true
        eligibility:
          $ref: '#/components/schemas/RfcEligibility'

    RfcEligibility:
      type: object
      required: [status, reasons]
      properties:
        status:
          type: string
          enum: [eligible, ineligible]
        reasons:
          type: array
          items:
            type: string

    RfcRender:
      type: object
      required: [repository_id, pr_number, head_sha, rendered_html, anchor_map]
      properties:
        repository_id:
          type: string
          format: uuid
        pr_number:
          type: integer
          minimum: 1
        head_sha:
          type: string
        rendered_html:
          type: string
        markdown_source:
          type: string
        anchor_map:
          type: array
          items:
            $ref: '#/components/schemas/Anchor'

    RfcCatalogResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RfcCatalogItem'
        total:
          type: integer
          minimum: 0

    RfcCatalogItem:
      type: object
      required:
        - id
        - title
        - path
        - source_type
        - source_label
        - allowed_actions
        - commentable
      properties:
        id:
          type: string
        title:
          type: string
        path:
          type: string
        source_type:
          type: string
          enum: [main, pull_request]
        source_label:
          type: string
          example: PR #42
        allowed_actions:
          type: array
          items:
            type: string
            enum: [view, comment]
        lifecycle_status:
          type: string
          enum: [draft, accepted, implemented, unknown]
          nullable: true
        pr_number:
          type: integer
          minimum: 1
          nullable: true
        pr_title:
          type: string
          nullable: true
        pr_state:
          type: string
          description: Top-level pull request state, such as open or closed.
          nullable: true
        pr_merged:
          type: boolean
          description: Whether the pull request has been merged.
        head_sha:
          type: string
          nullable: true
        head_ref:
          type: string
          nullable: true
        mergeable:
          type: boolean
          nullable: true
        mergeable_state:
          type: string
          nullable: true
        document_type:
          type: string
          description: Docuchango document type, such as adr, memo, prd, or rfc.
          nullable: true
        labels:
          type: array
          items:
            type: string
        changed_files:
          type: integer
          minimum: 0
        additions:
          type: integer
          minimum: 0
        deletions:
          type: integer
          minimum: 0
        commentable:
          type: boolean
        status_mutable:
          type: boolean
          description: >
            True when lifecycle status transitions (draft → accepted → implemented)
            are permitted. Always true for main-branch RFCs, always false for PR RFCs.

    RfcDocumentView:
      type: object
      required: [id, title, path, rendered_html, markdown_source]
      properties:
        id:
          type: string
        title:
          type: string
        path:
          type: string
        rendered_html:
          type: string
        markdown_source:
          type: string

    Anchor:
      type: object
      required: [anchor_id, line_start, line_end, text_fingerprint]
      properties:
        anchor_id:
          type: string
          format: uuid
        line_start:
          type: integer
          minimum: 1
        line_end:
          type: integer
          minimum: 1
        text_fingerprint:
          type: string

    Thread:
      type: object
      required:
        - id
        - repository_id
        - pr_number
        - status
        - anchor
        - messages
        - github_thread_id
        - sync
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        pr_number:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [open, resolved]
        anchor:
          $ref: '#/components/schemas/Anchor'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ThreadMessage'
        github_thread_id:
          type: string
          nullable: true
        sync:
          $ref: '#/components/schemas/SyncStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ThreadMessage:
      type: object
      required: [id, author, body, source_system, created_at]
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        source_system:
          type: string
          enum: [hermit, github]
        github_comment_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ThreadListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Thread'
        total:
          type: integer
          minimum: 0

    CreateThreadRequest:
      type: object
      required: [anchor, body]
      properties:
        anchor:
          $ref: '#/components/schemas/AnchorCreateInput'
        body:
          type: string
          minLength: 1

    ReplyThreadRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1

    AnchorCreateInput:
      type: object
      required: [line_start, line_end, text_fingerprint]
      properties:
        line_start:
          type: integer
          minimum: 1
        line_end:
          type: integer
          minimum: 1
        text_fingerprint:
          type: string

    ApproveReviewRequest:
      type: object
      properties:
        body:
          type: string
          description: Optional approval message.

    ReviewState:
      type: object
      required: [repository_id, pr_number, state, updated_at]
      properties:
        repository_id:
          type: string
          format: uuid
        pr_number:
          type: integer
          minimum: 1
        state:
          type: string
          enum: [approved, changes_requested, commented, pending]
        reviewer:
          type: string
        github_review_id:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    SyncStatus:
      type: object
      required: [state, last_synced_at, retry_count]
      properties:
        state:
          type: string
          enum: [synced, pending, failed, reconciling]
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        last_error_code:
          type: string
          nullable: true
        retry_count:
          type: integer
          minimum: 0
